version: "3.11"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Mount source for hot-reload during development
      - .:/app
      # Persist vector store data across container restarts
      - chroma_data:/app/data/chroma_db
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    volumes:
      - .:/app
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      api:
        condition: service_healthy

volumes:
  chroma_data:
    driver: local
