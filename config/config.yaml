# DocuVerse component selection — V1 (Phase 1)
# Each key maps a Protocol to the concrete implementation class that satisfies it.
# The factory in src/factory.py reads these to wire up the pipeline.

ingestion:
  parser: src.ingestion.parsers.PyPDFParser
  chunker: src.ingestion.chunkers.RecursiveChunker

retrieval:
  embedder: src.retrieval.embedders.OpenAIEmbedder
  vector_store: src.retrieval.vector_store.ChromaVectorStore
  retriever: src.retrieval.dense_retriever.DenseRetriever

generation:
  generator: src.generation.openai_generator.OpenAIGenerator
