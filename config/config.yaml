# DocuVerse component selection
# Each key maps a Protocol to the concrete implementation class that satisfies it.
# The factory in src/factory.py reads retrieval_strategy from Settings to wire
# the appropriate retriever chain.

ingestion:
  parser: src.ingestion.parsers.PyPDFParser
  chunker: src.ingestion.chunkers.RecursiveChunker

retrieval:
  embedder: src.retrieval.embedders.OpenAIEmbedder
  vector_store: src.retrieval.vector_store.ChromaVectorStore

  # Strategy options (set RETRIEVAL_STRATEGY env var to switch):
  #   dense            — DenseRetriever (cosine similarity only, default)
  #   sparse           — BM25Retriever (keyword search only)
  #   hybrid           — HybridRetriever (dense + BM25, fused with RRF)
  #   reranked_hybrid  — RerankedRetriever(HybridRetriever + CrossEncoderReranker)
  strategy: dense

generation:
  generator: src.generation.openai_generator.OpenAIGenerator
